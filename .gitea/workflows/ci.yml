name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Cancel older runs for the same ref when a new push/PR event arrives.
# Saves CI cycles on rapid re-pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv + pre-commit
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - run: uvx --with pre-commit==4.5.1 pre-commit run --all-files --hook-stage pre-commit
        env:
          SKIP: no-commit-to-branch
      - run: uvx --with pre-commit==4.5.1 pre-commit run --all-files --hook-stage pre-push
        env:
          SKIP: no-commit-to-branch

  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Release, Debug]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install tools
        run: pip install pre-commit clang-tidy==20.1.0

      - name: Check formatting
        run: pre-commit run clang-format --all-files

      - name: Configure for compile_commands.json
        run: cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: clang-tidy -p build include/mrmr/*.hpp tools/*.cpp

  sanitize:
    # Debug build with AddressSanitizer + UndefinedBehaviorSanitizer.
    # Runs the full test suite so any UB or memory bug instantiated in
    # test code fails the PR. Halt-on-error is enforced at compile time
    # via -fno-sanitize-recover=all; the env vars are belt-and-braces in
    # case the flag is ever changed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (Debug + sanitizers)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DMRMR_SANITIZE=ON

      - name: Build
        run: cmake --build build

      - name: Test under sanitizers
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:abort_on_error=1:print_stacktrace=1
        run: ctest --test-dir build --output-on-failure
