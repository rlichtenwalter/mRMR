# Default stage for every hook in this config. Individual hooks can opt
# into a different stage (e.g. linters/tests at pre-push) by setting
# their own `stages:`. Making this explicit avoids pre-commit's fallback
# behavior of running hooks at every stage.
default_stages: [pre-commit]

repos:
  # --- Commit stage: formatting + file hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
        args: [--maxkb=1000]
      - id: detect-private-key
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: check-case-conflict
        stages: [pre-commit]
      - id: mixed-line-ending
        stages: [pre-commit]
      - id: no-commit-to-branch
        stages: [pre-commit]
        args: [--branch, main, --branch, develop]

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.2
    hooks:
      - id: clang-format
        stages: [pre-commit]
        types_or: [c, c++]
